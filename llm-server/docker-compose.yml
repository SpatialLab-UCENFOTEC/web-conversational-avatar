services:

  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:v0.2.2
    # GPU: ghcr.io/remsky/kokoro-fastapi-gpu:v0.2.2
    ports:
      - "8880:8880"
    volumes:
      - kokoro-models:/app/models
      - ./kokoro-voices:/app/voices/v1_0   # voces extra (español, etc.)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8880/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./dist:/app/dist
    environment:
      - KOKORO_URL=http://kokoro:8880
      - KOKORO_VOICE=ef_dora          # voz española por defecto
      - OLLAMA_URL=http://host-gateway:11434
    extra_hosts:
      - "host-gateway:host-gateway"
    depends_on:
      kokoro:
        condition: service_healthy
    restart: unless-stopped

volumes:
  kokoro-models: